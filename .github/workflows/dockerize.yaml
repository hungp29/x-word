name: Build and Push Image and Chart

on:
  push:
    tags: ['*']
  workflow_dispatch:
    # When triggered by Cut Release workflow, ref is set to the new tag

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/x-word
  CHART_PATH: charts/x-word

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set tag
        id: tag
        run: |
          # Single tag for both image and chart: <git-tag>-run_number
          TAG="${{ github.ref_name }}-${{ github.run_number }}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.16.0'

      - name: Login to GHCR (Helm)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Package and push chart
        run: |
          helm package ${{ env.CHART_PATH }} --version "${{ steps.tag.outputs.tag }}"
          helm push x-word-${{ steps.tag.outputs.tag }}.tgz oci://${{ env.REGISTRY }}/${{ github.repository_owner }}

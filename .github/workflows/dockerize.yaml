name: Build and Push Docker Image

on:
  push:
    tags: ['*']
  workflow_dispatch:
    # When triggered by Cut Release workflow, ref is set to the new tag

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/x-word

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag env
        id: tag
        run: |
          # Release tag only: image tag = <git tag>-run_number
          IMAGE_TAG="${{ github.ref_name }}-${{ github.run_number }}"
          echo "tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "tags<<EOF" >> "$GITHUB_OUTPUT"
          echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.tag.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

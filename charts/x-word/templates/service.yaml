apiVersion: v1
kind: Service
metadata:
  name: {{ include "x-word.fullname" . }}
  labels:
    {{- include "x-word.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: grpc
      protocol: TCP
      name: grpc
  selector:
    app.kubernetes.io/name: {{ include "x-word.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}

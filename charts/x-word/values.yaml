replicaCount: 1

image:
  repository: x-word
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

resources:
  limits:
    cpu: 200m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 3
  periodSeconds: 5

env:
  HTTP_PORT: "8080"

ingress:
  enabled: true
  className: nginx
  path: /x-word(/|$)(.*)
  pathType: ImplementationSpecific
  rewriteTarget: /$2
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
  hosts:
    - momofamily.tplinkdns.com
  # cert-manager ClusterIssuer for TLS (e.g. letsencrypt-prod on microk8s)
  clusterIssuer: letsencrypt-prod
  tls:
    - secretName: x-word-tls
      hosts:
        - momofamily.tplinkdns.com
